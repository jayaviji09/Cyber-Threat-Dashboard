<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #0f172a, #1e293b);
            font-family: Arial, sans-serif;
        }

        .login-box {
            background: #111827;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #38bdf8;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #cbd5e1;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form method="POST"autocomplete="off">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username"autocomplete="off"required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password"autocomplete="new-password"required>

        <button type="submit">Login</button>

    </form>
</div>

</body>
</html>
