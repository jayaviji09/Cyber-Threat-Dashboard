<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Threat Result</title>
    <style>
        
        body {
            margin: 0;
            padding: 0;
            background: #0a192f; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        
        .alert-box {
            background: #111827;
            width: 450px;
            padding: 50px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), 0 0 15px rgba(56, 189, 248, 0.2);
            border: 2px solid #1e293b;
            position: relative;
        }

        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .high-threat { color: #ef4444; } 
        .low-threat { color: #22c55e; }  

        .alert-count {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .alert-count b {
            color: #f59e0b;
            font-size: 20px;
        }

        
        .button-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        
        .prev-btn {
            background: #1e293b;
            color: white;
            border: 1px solid #38bdf8;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 600;
            transition: 0.3s;
        }

        .prev-btn:hover { background: #334155; }

        .arrow-circle {
            background: white;
            color: black;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-left: 10px;
            font-weight: bold;
        }

        
        .close-btn {
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 18px;
            transition: 0.3s;
        }

        .close-btn:hover { color: #ef4444; }

        .close-icon {
            font-size: 22px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="alert-box">
        <h1 class="{{ 'high-threat' if status == 'HIGH' else 'low-threat' }}">
            {{ status }} THREAT DETECTED!
        </h1>
        
        <p class="alert-count">
            Micro Anomaly Alerts: <b>{{ alerts }}</b>
        </p>

        <div class="button-group">
            <a href="javascript:history.back()" class="prev-btn">
                PREV <span class="arrow-circle">←</span>
            </a>

            <a href="/" class="close-btn">
                Close <span class="close-icon">✕</span>
            </a>
        </div>
    </div>

</body>
</html>
